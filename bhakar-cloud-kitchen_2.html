<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bhakar Cloud Kitchen — Home-style Bhaji &amp; Bhakri, Pickup Only</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,500&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --yellow:#F3C64B;
    --yellow-light:#FFF6DE;
    --yellow-deep:#E8A93C;
    --red:#B3242A;
    --red-dark:#7E171C;
    --ink:#2B1B12;
    --ink-soft:#6B5744;
    --cream-card:#FFFDF6;
    --steel:#D6D2C4;
    --steel-dark:#B7B2A0;
    --success:#2E7D46;
    --danger:#B3242A;
    --radius:16px;
    --shadow: 0 10px 30px rgba(43,27,18,0.12);
    --shadow-sm: 0 4px 14px rgba(43,27,18,0.08);
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    margin:0;
    background:var(--yellow-light);
    color:var(--ink);
    font-family:'Poppins',sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,h4{font-family:'Fraunces',serif; margin:0; color:var(--ink);}
  p{margin:0;}
  a{color:inherit;}
  button{font-family:inherit; cursor:pointer;}
  img{max-width:100%; display:block;}
  :focus-visible{outline:3px solid var(--red); outline-offset:2px;}
  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.001ms !important; transition-duration:0.001ms !important;}
  }

  .wrap{max-width:1180px; margin:0 auto; padding:0 24px;}

  /* ---------- HEADER ---------- */
  .site-header{
    position:sticky; top:0; z-index:40;
    background:rgba(255,246,222,0.92);
    backdrop-filter:blur(8px);
    border-bottom:2px solid var(--yellow-deep);
  }
  .header-inner{display:flex; align-items:center; justify-content:space-between; padding:14px 24px; max-width:1180px; margin:0 auto;}
  .brand{display:flex; align-items:center; gap:12px;}
  .brand-mark{
    width:46px; height:46px; border-radius:50%;
    background:linear-gradient(155deg,var(--red),var(--red-dark));
    display:flex; align-items:center; justify-content:center;
    color:var(--yellow-light); font-family:'Fraunces',serif; font-weight:700; font-size:20px;
    box-shadow:var(--shadow-sm);
  }
  .brand-text h1{font-size:20px; line-height:1.1; letter-spacing:0.3px;}
  .brand-text span{font-size:11px; letter-spacing:1.5px; text-transform:uppercase; color:var(--ink-soft); font-weight:600;}
  .header-actions{display:flex; align-items:center; gap:10px;}
  .icon-btn{
    position:relative; border:none; background:var(--red); color:#fff;
    width:44px; height:44px; border-radius:50%; display:flex; align-items:center; justify-content:center;
    box-shadow:var(--shadow-sm); transition:transform .15s ease;
  }
  .icon-btn:hover{transform:translateY(-2px);}
  .cart-badge{
    position:absolute; top:-4px; right:-4px; background:var(--yellow); color:var(--ink);
    font-size:11px; font-weight:700; border-radius:50%; min-width:18px; height:18px;
    display:flex; align-items:center; justify-content:center; padding:0 3px; border:2px solid var(--yellow-light);
  }
  .call-link{
    display:none; align-items:center; gap:8px; background:var(--yellow); color:var(--ink);
    padding:9px 16px; border-radius:999px; font-weight:600; font-size:13.5px; box-shadow:var(--shadow-sm);
  }
  @media(min-width:640px){ .call-link{display:flex;} }

  /* ---------- HERO ---------- */
  .hero{position:relative; overflow:hidden; padding:64px 0 40px;}
  .hero-inner{display:grid; grid-template-columns:1.1fr 0.9fr; gap:40px; align-items:center;}
  @media(max-width:860px){ .hero-inner{grid-template-columns:1fr; text-align:center;} .hero-tiffin{order:-1;} }
  .eyebrow{
    display:inline-flex; align-items:center; gap:8px; background:#fff; border:1.5px solid var(--yellow-deep);
    color:var(--red-dark); font-size:12.5px; font-weight:600; letter-spacing:0.5px; text-transform:uppercase;
    padding:6px 14px; border-radius:999px; margin-bottom:18px;
  }
  .hero h2{font-size:44px; line-height:1.08; font-weight:600; margin-bottom:16px;}
  .hero h2 em{font-style:italic; color:var(--red);}
  .hero-sub{font-size:16.5px; color:var(--ink-soft); max-width:480px; line-height:1.6; margin-bottom:26px;}
  @media(max-width:860px){ .hero-sub{margin-left:auto;margin-right:auto;} }
  .hero-ctas{display:flex; gap:14px; flex-wrap:wrap;}
  @media(max-width:860px){ .hero-ctas{justify-content:center;} }
  .btn{
    border:none; border-radius:999px; padding:14px 26px; font-weight:600; font-size:15px;
    display:inline-flex; align-items:center; gap:8px; transition:transform .15s ease, box-shadow .15s ease;
  }
  .btn-primary{background:var(--red); color:#fff; box-shadow:0 8px 20px rgba(179,36,42,0.35);}
  .btn-primary:hover{transform:translateY(-2px); box-shadow:0 12px 26px rgba(179,36,42,0.4);}
  .btn-ghost{background:#fff; color:var(--ink); border:1.5px solid var(--steel-dark);}
  .btn-ghost:hover{border-color:var(--red); color:var(--red);}
  .btn-yellow{background:var(--yellow); color:var(--ink); box-shadow:0 8px 18px rgba(232,169,60,0.4);}
  .btn-yellow:hover{transform:translateY(-2px);}
  .btn:disabled{opacity:0.5; cursor:not-allowed; transform:none !important;}
  .btn-sm{padding:9px 16px; font-size:13px;}
  .btn-block{width:100%; justify-content:center;}
  .btn-danger-outline{background:#fff; color:var(--red); border:1.5px solid var(--red);}

  .info-pills{display:flex; gap:12px; flex-wrap:wrap; margin-top:28px;}
  @media(max-width:860px){ .info-pills{justify-content:center;} }
  .pill{
    background:#fff; border-radius:14px; padding:10px 16px; box-shadow:var(--shadow-sm);
    display:flex; align-items:center; gap:10px; font-size:13px; color:var(--ink-soft); font-weight:500;
  }
  .pill b{color:var(--ink); font-weight:700;}

  .hero-tiffin{display:flex; justify-content:center;}
  .tiffin-svg{width:min(320px,80%); filter:drop-shadow(0 20px 30px rgba(43,27,18,0.18));}

  /* ---------- SECTION SHELL ---------- */
  .section{padding:52px 0;}
  .section-head{display:flex; align-items:flex-end; justify-content:space-between; margin-bottom:26px; flex-wrap:wrap; gap:10px;}
  .section-head h3{font-size:30px; font-weight:600;}
  .section-tag{font-size:12.5px; text-transform:uppercase; letter-spacing:1.5px; color:var(--red-dark); font-weight:700; margin-bottom:6px; display:block;}
  .section-note{color:var(--ink-soft); font-size:14px; max-width:420px;}

  .band-divider{
    height:14px; margin:6px 0 40px; border-radius:8px;
    background:repeating-linear-gradient(90deg, var(--steel) 0 26px, var(--steel-dark) 26px 30px);
    position:relative; box-shadow:inset 0 2px 4px rgba(0,0,0,0.12);
  }

  /* ---------- PRODUCT GRID ---------- */
  .grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:20px;}
  .card{
    background:var(--cream-card); border-radius:var(--radius); overflow:hidden; box-shadow:var(--shadow-sm);
    display:flex; flex-direction:column; border:1px solid rgba(232,169,60,0.25); position:relative;
    transition:transform .18s ease, box-shadow .18s ease;
  }
  .card:hover{transform:translateY(-4px); box-shadow:var(--shadow);}
  .card-img-wrap{position:relative; aspect-ratio:4/3; background:var(--yellow-light); overflow:hidden;}
  .card-img-wrap img{width:100%; height:100%; object-fit:cover;}
  .special-tag{
    position:absolute; top:10px; left:10px; background:var(--yellow); color:var(--ink); font-size:11px; font-weight:700;
    padding:5px 10px; border-radius:999px; letter-spacing:0.4px; box-shadow:var(--shadow-sm);
  }
  .stock-overlay{
    position:absolute; inset:0; background:rgba(43,27,18,0.55); color:#fff; display:flex; align-items:center; justify-content:center;
    font-weight:700; font-size:14px; letter-spacing:0.5px; text-transform:uppercase;
  }
  .card-body{padding:16px 18px 18px; display:flex; flex-direction:column; gap:8px; flex:1;}
  .card-body h4{font-size:18px; font-weight:600;}
  .card-desc{font-size:13.5px; color:var(--ink-soft); line-height:1.5; min-height:20px;}
  .card-foot{display:flex; align-items:center; justify-content:space-between; margin-top:auto; padding-top:8px;}
  .price{font-family:'Fraunces',serif; font-weight:700; font-size:19px; color:var(--red-dark);}
  .qty-stepper{display:flex; align-items:center; gap:10px; background:var(--yellow-light); border-radius:999px; padding:6px 8px;}
  .qty-stepper button{width:26px; height:26px; border-radius:50%; border:none; background:#fff; box-shadow:var(--shadow-sm); font-size:16px; font-weight:700; color:var(--red);}
  .add-btn{background:var(--red); color:#fff; border:none; border-radius:999px; padding:9px 18px; font-weight:600; font-size:13.5px; box-shadow:0 6px 14px rgba(179,36,42,0.3);}
  .add-btn:hover{transform:translateY(-1px);}

  /* ---------- DAILY MEAL BAR ---------- */
  .daily-bar{
    background:#fff; border:1.5px dashed var(--yellow-deep); border-radius:var(--radius);
    padding:16px 20px; display:flex; align-items:center; gap:14px; flex-wrap:wrap; margin-top:8px; margin-bottom:8px;
  }
  .daily-bar input{
    border:1.5px solid var(--steel-dark); border-radius:10px; padding:10px 14px; font-size:14px; font-family:inherit; min-width:180px; flex:1;
  }

  /* ---------- FLOATING CART ---------- */
  .fab-cart{
    position:fixed; right:20px; bottom:20px; z-index:50; background:var(--red); color:#fff;
    border:none; border-radius:999px; padding:14px 22px; box-shadow:0 12px 26px rgba(179,36,42,0.45);
    display:flex; align-items:center; gap:10px; font-weight:600; font-size:14.5px;
  }
  .fab-cart .badge{background:var(--yellow); color:var(--ink); border-radius:50%; width:24px; height:24px; display:flex; align-items:center; justify-content:center; font-size:12.5px; font-weight:800;}

  /* ---------- MODALS ---------- */
  .modal-overlay{
    position:fixed; inset:0; background:rgba(43,27,18,0.55); z-index:100; display:flex; align-items:center; justify-content:center; padding:16px;
    animation:fadeIn .18s ease;
  }
  @keyframes fadeIn{from{opacity:0;} to{opacity:1;}}
  .modal{
    background:#fff; border-radius:20px; max-width:520px; width:100%; max-height:88vh; overflow-y:auto; box-shadow:0 30px 60px rgba(0,0,0,0.3);
    animation:slideUp .22s ease;
  }
  @keyframes slideUp{from{transform:translateY(24px); opacity:0;} to{transform:translateY(0); opacity:1;}}
  .modal-lg{max-width:640px;}
  .modal-head{display:flex; align-items:center; justify-content:space-between; padding:20px 24px; border-bottom:1px solid #f0e9d8; position:sticky; top:0; background:#fff; z-index:2;}
  .modal-head h3{font-size:20px;}
  .modal-close{background:none; border:none; font-size:22px; color:var(--ink-soft); line-height:1;}
  .modal-body{padding:22px 24px;}
  .modal-foot{padding:16px 24px 22px;}

  .cart-line{display:flex; align-items:center; justify-content:space-between; padding:12px 0; border-bottom:1px solid #f4ecd9; gap:10px;}
  .cart-line-name{font-weight:600; font-size:14.5px;}
  .cart-line-sub{font-size:12.5px; color:var(--ink-soft);}
  .cart-remove{background:none; border:none; color:var(--red); font-size:12.5px; font-weight:600; text-decoration:underline;}
  .cart-total-row{display:flex; justify-content:space-between; align-items:center; padding:16px 0 4px; font-size:17px; font-weight:700;}

  .field{margin-bottom:16px;}
  .field label{display:block; font-size:13px; font-weight:600; margin-bottom:6px; color:var(--ink-soft);}
  .field input, .field select, .field textarea{
    width:100%; border:1.5px solid var(--steel-dark); border-radius:10px; padding:11px 13px; font-size:14.5px; font-family:inherit; background:#fffdf9;
  }
  .field textarea{resize:vertical; min-height:70px;}
  .field-error{color:var(--red-dark); font-size:12.5px; margin-top:6px; font-weight:600; display:none;}
  .field-error.show{display:block;}

  .pickup-toggle{display:flex; gap:10px; margin-bottom:14px;}
  .pickup-opt{
    flex:1; border:2px solid var(--steel-dark); border-radius:12px; padding:12px; text-align:center; background:#fff; cursor:pointer;
  }
  .pickup-opt.active{border-color:var(--red); background:#FFF1EF;}
  .pickup-opt b{display:block; font-size:14.5px;}
  .pickup-opt span{font-size:11.5px; color:var(--ink-soft);}

  .star-row{display:flex; gap:6px; font-size:28px; margin-bottom:6px;}
  .star{cursor:pointer; color:var(--steel-dark); transition:color .1s;}
  .star.filled{color:var(--yellow-deep);}

  .toast-stack{position:fixed; top:16px; left:50%; transform:translateX(-50%); z-index:200; display:flex; flex-direction:column; gap:8px; align-items:center;}
  .toast{background:var(--ink); color:#fff; padding:12px 20px; border-radius:999px; font-size:13.5px; font-weight:500; box-shadow:var(--shadow); animation:fadeIn .2s ease;}

  /* ---------- FEEDBACK ---------- */
  .fb-grid{display:grid; grid-template-columns:1fr 1.3fr; gap:28px;}
  @media(max-width:800px){ .fb-grid{grid-template-columns:1fr;} }
  .fb-card{background:#fff; border-radius:var(--radius); padding:20px; box-shadow:var(--shadow-sm); margin-bottom:14px;}
  .fb-stars{color:var(--yellow-deep); font-size:15px; margin-bottom:6px;}
  .fb-name{font-weight:700; font-size:14px;}
  .fb-date{font-size:11.5px; color:var(--ink-soft);}
  .fb-comment{font-size:13.5px; color:var(--ink-soft); margin-top:6px; line-height:1.5;}
  .fb-empty{color:var(--ink-soft); font-size:14px; font-style:italic;}

  /* ---------- FOOTER ---------- */
  footer{background:var(--ink); color:#EFE3CE; padding:44px 0 22px; margin-top:30px;}
  .footer-grid{display:grid; grid-template-columns:1.3fr 1fr 1fr; gap:30px;}
  @media(max-width:760px){ .footer-grid{grid-template-columns:1fr;} }
  footer h4{color:#fff; font-size:16px; margin-bottom:12px;}
  footer p, footer a{font-size:13.5px; color:#D8C9AC; line-height:1.7; text-decoration:none;}
  footer a:hover{color:var(--yellow);}
  .footer-bottom{border-top:1px solid rgba(255,255,255,0.12); margin-top:30px; padding-top:18px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px;}
  .owner-link{font-size:11.5px; color:#8a7d64; text-decoration:underline; background:none; border:none; font-family:inherit;}

  /* ---------- ADMIN ---------- */
  .admin-shell{min-height:100vh; background:var(--yellow-light);}
  .admin-login-wrap{min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;}
  .admin-login-card{background:#fff; border-radius:20px; padding:36px 32px; max-width:380px; width:100%; box-shadow:var(--shadow); text-align:center;}
  .admin-topbar{background:var(--ink); color:#fff; padding:14px 24px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px;}
  .admin-tabs{display:flex; gap:8px; padding:18px 24px 0; flex-wrap:wrap;}
  .admin-tab{background:#fff; border:1.5px solid var(--steel-dark); padding:9px 18px; border-radius:999px; font-weight:600; font-size:13.5px; color:var(--ink-soft);}
  .admin-tab.active{background:var(--red); color:#fff; border-color:var(--red);}
  .admin-content{padding:22px 24px 60px;}
  .admin-order-card{background:#fff; border-radius:14px; padding:16px 18px; box-shadow:var(--shadow-sm); margin-bottom:14px; border-left:5px solid var(--yellow-deep);}
  .admin-order-card.status-ready{border-left-color:var(--success);}
  .status-chip{font-size:11px; font-weight:700; text-transform:uppercase; padding:4px 10px; border-radius:999px; background:var(--yellow); color:var(--ink);}
  .status-chip.ready{background:var(--success); color:#fff;}
  .admin-product-row{background:#fff; border-radius:14px; padding:14px 16px; box-shadow:var(--shadow-sm); display:flex; gap:14px; align-items:center; margin-bottom:12px; flex-wrap:wrap;}
  .admin-product-row img{width:64px; height:64px; object-fit:cover; border-radius:10px; flex-shrink:0;}
  .row-out{opacity:0.55;}
  .img-upload-preview{width:100%; aspect-ratio:4/3; border-radius:12px; background:var(--yellow-light); overflow:hidden; margin-bottom:10px; border:1.5px dashed var(--steel-dark); display:flex; align-items:center; justify-content:center; color:var(--ink-soft); font-size:13px;}
  .img-upload-preview img{width:100%; height:100%; object-fit:cover;}
  .switch-row{display:flex; align-items:center; justify-content:space-between; padding:10px 0;}
  .switch{position:relative; width:46px; height:26px; background:var(--steel-dark); border-radius:999px; border:none; flex-shrink:0;}
  .switch.on{background:var(--success);}
  .switch::after{content:''; position:absolute; top:3px; left:3px; width:20px; height:20px; background:#fff; border-radius:50%; transition:left .15s;}
  .switch.on::after{left:23px;}
  .empty-state{text-align:center; padding:50px 20px; color:var(--ink-soft);}
  .empty-state h4{margin-bottom:6px; color:var(--ink);}
</style>
</head>

<script>
/* ============================= STATE ============================= */
const ADMIN_PASSWORD = "Bhakar@421503"; // change this to whatever you like — search this line to edit it

let products = [];
let orders = [];
let feedbacks = [];
let dailyMeals = [];

let currentView = 'customer'; // customer | adminLogin | admin
let adminAuthed = false;
let adminTab = 'products';

let cart = []; // {productId, name, price, qty}
let cartOpen = false;
let checkoutOpen = false;
let dailyMealPromptOpen = false;
let pendingDailyMealSig = null;
let pendingDailyMealPhone = null;
let pendingDailyMealName = null;
let feedbackStars = 0;

let pickupMode = 'schedule'; // 'schedule' | 'now'
let pickupDateTime = '';
let checkoutName = '';
let checkoutPhone = '';
let fbName = '';
let fbComment = '';

let editingProduct = null; // null | 'new' | product object
let loginError = '';

const SHOP = {
  name: "Bhakar Cloud Kitchen",
  phone: "+91 7767835839",
  address: "Shop No.1, Poonam Apartment, Ganesh Ghat, Katrap, Badlapur, Maharashtra 421503",
  timing: "7:00 AM – 11:00 PM, Mon–Sun"
};

/* ============================= STORAGE HELPERS ============================= */
async function loadJSON(key, fallback){
  try{
    const res = await window.storage.get(key, true);
    if(!res || !res.value) return fallback;
    return JSON.parse(res.value);
  }catch(e){
    return fallback;
  }
}
async function saveJSON(key, value){
  try{
    await window.storage.set(key, JSON.stringify(value), true);
  }catch(e){
    console.error('storage save failed', key, e);
  }
}
const saveProducts = () => saveJSON('bck-products', products);
const saveOrders = () => saveJSON('bck-orders', orders);
const saveFeedbacks = () => saveJSON('bck-feedback', feedbacks);
const saveDailyMeals = () => saveJSON('bck-daily-meals', dailyMeals);

/* ============================= UTIL ============================= */
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function rupee(n){ return '₹' + Number(n).toFixed(0); }
function cartTotal(){ return cart.reduce((s,i)=>s+i.price*i.qty,0); }
function cartCount(){ return cart.reduce((s,i)=>s+i.qty,0); }
function cartSignature(items){ return items.map(i=>i.productId).sort().join(','); }
function escapeHtml(str){ return (str||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function showToast(msg){
  const stack = document.getElementById('toast-stack');
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  stack.appendChild(el);
  setTimeout(()=>{ el.style.opacity='0'; el.style.transition='opacity .3s'; setTimeout(()=>el.remove(),300); }, 2600);
}
function placeholderImage(emoji, bg){
  const svg = '<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300"><rect width="400" height="300" fill="'+bg+'"/><text x="50%" y="54%" font-size="90" text-anchor="middle" dominant-baseline="middle">'+emoji+'</text></svg>';
  return 'data:image/svg+xml;utf8,' + encodeURIComponent(svg);
}
function compressImage(file){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = (e)=>{
      const img = new Image();
      img.onload = ()=>{
        const maxW = 640;
        const scale = Math.min(1, maxW/img.width);
        const canvas = document.createElement('canvas');
        canvas.width = img.width*scale;
        canvas.height = img.height*scale;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img,0,0,canvas.width,canvas.height);
        resolve(canvas.toDataURL('image/jpeg', 0.72));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
function nowLocalInputValue(offsetMinutes){
  const d = new Date(Date.now() + offsetMinutes*60000);
  d.setSeconds(0,0);
  const pad = n => String(n).padStart(2,'0');
  return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())+'T'+pad(d.getHours())+':'+pad(d.getMinutes());
}
function fmtDateTime(iso){
  if(iso === 'ASAP') return 'As soon as possible (2–3 min)';
  const d = new Date(iso);
  if(isNaN(d)) return iso;
  return d.toLocaleString('en-IN', {day:'numeric', month:'short', hour:'numeric', minute:'2-digit'});
}

/* ============================= INIT ============================= */
async function init(){
  products = await loadJSON('bck-products', null);
  if(!products){ products = seedProducts(); await saveProducts(); }
  orders = await loadJSON('bck-orders', []);
  feedbacks = await loadJSON('bck-feedback', []);
  dailyMeals = await loadJSON('bck-daily-meals', []);
  render();
}
init();

/* ============================= RENDER ROOT ============================= */

  const app = document.getElementById('app');

}

  ${sorted.length===0 ? `<div class="empty-state"><h4>No orders yet</h4><p>New orders from customers will show up here.</p></div>` :
  sorted.map(o=>`
    <div class="admin-order-card ${o.status==='ready'?'status-ready':''}">
      <div style="display:flex; justify-content:space-between; align-items:flex-start; gap:10px; flex-wrap:wrap;">
        <div>
          <b>${escapeHtml(o.customerName)}</b> · <a href="tel:${o.phone}">${o.phone}</a>
          <div style="font-size:12px; color:var(--ink-soft);">${new Date(o.timestamp).toLocaleString('en-IN')}</div>
        </div>
        <span class="status-chip ${o.status==='ready'?'ready':''}">${o.status==='ready'?'Ready / Done':'Pending'}</span>
      </div>
      <div style="margin:10px 0; font-size:13.5px;">
        ${o.items.map(i=>`${i.qty}× ${escapeHtml(i.name)}`).join(', ')}
      </div>
      <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px;">
        <div><b>${rupee(o.total)}</b> · Pickup: ${fmtDateTime(o.pickupTime)}</div>
        ${o.status!=='ready' ? `<button class="btn btn-primary btn-sm" data-action="mark-ready" data-id="${o.id}">Mark Ready</button>` :
          `<button class="btn btn-ghost btn-sm" data-action="mark-pending" data-id="${o.id}">Reopen</button>`}
      </div>
    </div>`).join('')}
  `;
}

function renderAdminFeedback(){
  const sorted = [...feedbacks].sort((a,b)=>b.timestamp-a.timestamp);
  return `
  <h3 style="font-size:22px; margin-bottom:16px;">Customer Feedback</h3>
  ${sorted.length===0 ? `<div class="empty-state"><h4>No feedback yet</h4></div>` :
  sorted.map(f=>`
    <div class="fb-card">
      <div class="fb-stars">${'★'.repeat(f.stars)}${'☆'.repeat(5-f.stars)}</div>
      <div class="fb-name">${escapeHtml(f.name)} <span class="fb-date">· ${new Date(f.timestamp).toLocaleString('en-IN')}</span></div>
      <div class="fb-comment">${escapeHtml(f.comment)}</div>
    </div>`).join('')}
  `;
}

/* ============================= EVENT HANDLING ============================= */
document.addEventListener('click', async (e)=>{
  // Close a modal only when the backdrop itself is clicked directly,
  // never when a click merely bubbles up from something inside the modal.
  if(e.target.classList && e.target.classList.contains('modal-overlay')){
    const overlayAction = e.target.dataset.action;
    if(overlayAction === 'close-cart-overlay') cartOpen = false;
    if(overlayAction === 'close-checkout-overlay') checkoutOpen = false;
    if(overlayAction === 'close-product-modal-overlay') editingProduct = null;
    render();
    return;
  }

  const t = e.target.closest('[data-action]:not(.modal-overlay)');
  if(!t) return;
  const action = t.dataset.action;

  switch(action){
    case 'scroll-to': {
      const el = document.getElementById(t.dataset.target);
      if(el) el.scrollIntoView({behavior:'smooth'});
      break;
    }
    case 'open-cart': cartOpen = true; render(); break;
    case 'close-cart': case 'close-cart-overlay': cartOpen = false; render(); break;
    case 'go-to-checkout': cartOpen=false; checkoutOpen=true; pickupDateTime = nowLocalInputValue(30); render(); break;
    case 'close-checkout': case 'close-checkout-overlay': checkoutOpen=false; render(); break;

    case 'add-to-cart': {
      const p = products.find(x=>x.id===t.dataset.id);
      if(!p || !p.inStock) break;
      cart.push({productId:p.id, name:p.name, price:p.price, qty:1});
      render();
      break;
    }
    case 'inc-qty': {
      const c = cart.find(x=>x.productId===t.dataset.id);
      if(c){ c.qty++; }
      else {
        const p = products.find(x=>x.id===t.dataset.id);
        if(p) cart.push({productId:p.id, name:p.name, price:p.price, qty:1});
      }
      render();
      break;
    }
    case 'dec-qty': {
      const c = cart.find(x=>x.productId===t.dataset.id);
      if(c){ c.qty--; if(c.qty<=0) cart = cart.filter(x=>x.productId!==t.dataset.id); }
      render();
      break;
    }
    case 'remove-from-cart': cart = cart.filter(x=>x.productId!==t.dataset.id); render(); break;

    case 'set-pickup-mode': pickupMode = t.dataset.mode; render(); break;

    case 'place-order': await placeOrder(); break;

    case 'load-daily-meal': loadDailyMeal(); break;

    case 'confirm-daily-meal': await confirmDailyMeal(); break;
    case 'decline-daily-meal': dailyMealPromptOpen=false; pendingDailyMealSig=null; render(); break;

    case 'set-star': feedbackStars = parseInt(t.dataset.val); render(); break;
    case 'submit-feedback': await submitFeedback(); break;

    case 'goto-admin': currentView='adminLogin'; loginError=''; render(); break;
    case 'back-to-site': currentView='customer'; render(); break;
    case 'admin-login': doAdminLogin(); break;
    case 'admin-logout': adminAuthed=false; currentView='customer'; render(); break;
    case 'admin-tab': adminTab = t.dataset.tab; render(); break;

    case 'new-product': editingProduct='new'; render(); break;
    case 'edit-product': editingProduct = products.find(p=>p.id===t.dataset.id); render(); break;
    case 'close-product-modal': case 'close-product-modal-overlay': editingProduct=null; render(); break;
    case 'toggle-switch': t.classList.toggle('on'); break;
    case 'save-product': await saveProductFromForm(t.dataset.id, t.dataset.isnew==='true'); break;
    case 'delete-product': {
      if(confirm('Delete this product? This cannot be undone.')){
        products = products.filter(p=>p.id!==t.dataset.id);
        await saveProducts();
        render();
      }
      break;
    }
    case 'toggle-stock': {
      const p = products.find(p=>p.id===t.dataset.id);
      if(p){ p.inStock = !p.inStock; await saveProducts(); render(); }
      break;
    }
    case 'refresh-orders': {
      orders = await loadJSON('bck-orders', []);
      feedbacks = await loadJSON('bck-feedback', []);
      render();
      showToast('Refreshed');
      break;
    }
    case 'mark-ready': {
      const o = orders.find(o=>o.id===t.dataset.id);
      if(o){ o.status='ready'; await saveOrders(); render(); }
      break;
    }
    case 'mark-pending': {
      const o = orders.find(o=>o.id===t.dataset.id);
      if(o){ o.status='pending'; await saveOrders(); render(); }
      break;
    }
  }
});

document.addEventListener('input', (e)=>{
  if(e.target.id === 'ck-name') checkoutName = e.target.value;
  if(e.target.id === 'ck-phone') checkoutPhone = e.target.value;
  if(e.target.id === 'fb-name') fbName = e.target.value;
  if(e.target.id === 'fb-comment') fbComment = e.target.value;
});

document.addEventListener('change', async (e)=>{
  if(e.target.id === 'pf-image'){
    const file = e.target.files[0];
    if(file){
      const dataUrl = await compressImage(file);
      const wrap = document.getElementById('img-preview-wrap');
      wrap.innerHTML = `<img src="${dataUrl}" id="img-preview">`;
      wrap.dataset.value = dataUrl;
    }
  }
  if(e.target.id === 'ck-time'){
    validateCheckoutTime();
  }
});

function validateCheckoutTime(){
  const input = document.getElementById('ck-time');
  const errorEl = document.getElementById('ck-time-error');
  if(!input) return true;
  const chosen = new Date(input.value);
  const now = new Date();
  const maxAllowed = new Date(now.getTime() + 48*60*60*1000);
  let msg = '';
  if(isNaN(chosen)){ msg = 'Please choose a pickup time.'; }
  else if(chosen < now){ msg = "Pickup time can't be in the past."; }
  else if(chosen > maxAllowed){ msg = "Can't order 2 or more than 2 days earlier."; }
  else if(chosen.getHours() < 7 || chosen.getHours() >= 23){ msg = 'Shop is open ' + SHOP.timing + '. Please pick a time within these hours.'; }
  if(errorEl){ errorEl.textContent = msg || "Can't order 2 or more than 2 days earlier."; errorEl.classList.toggle('show', !!msg); }
  return !msg;
}

/* ---------- ORDER LOGIC ---------- */
async function placeOrder(){
  const name = document.getElementById('ck-name').value.trim();
  const phone = document.getElementById('ck-phone').value.trim();
  if(!name){ showToast('Please enter your name'); return; }
  if(!/^\d{10}$/.test(phone)){ showToast('Please enter a valid 10-digit phone number'); return; }

  let pickupTimeVal;
  if(pickupMode === 'now'){
    pickupTimeVal = 'ASAP';
  } else {
    if(!validateCheckoutTime()){ showToast('Please fix the pickup time'); return; }
    const input = document.getElementById('ck-time');
    pickupTimeVal = new Date(input.value).toISOString();
    pickupDateTime = input.value;
  }

  const freshItems = cart.filter(c=>{
    const p = products.find(pp=>pp.id===c.productId);
    return p && p.inStock;
  });
  if(freshItems.length === 0){ showToast('Items in your cart are no longer available'); return; }

  const order = {
    id: uid(),
    customerName: name,
    phone,
    items: freshItems.map(c=>({productId:c.productId, name:c.name, price:c.price, qty:c.qty})),
    total: freshItems.reduce((s,i)=>s+i.price*i.qty,0),
    pickupTime: pickupTimeVal,
    status: 'pending',
    timestamp: Date.now()
  };

  const sig = cartSignature(freshItems);
  const priorMatches = orders.filter(o => o.phone === phone && cartSignature(o.items) === sig).length;

  orders.push(order);
  await saveOrders();

  const alreadySaved = dailyMeals.some(dm => dm.phone === phone && dm.signature === sig);

  cart = [];
  checkoutOpen = false;
  checkoutName = '';
  checkoutPhone = '';
  pickupMode = 'schedule';

  if(priorMatches >= 2 && !alreadySaved){
    pendingDailyMealSig = sig;
    pendingDailyMealPhone = phone;
    pendingDailyMealName = name;
    dailyMealPromptOpen = true;
  } else {
    showToast('Order placed! See you soon 🙌');
  }
  render();
}

async function confirmDailyMeal(){
  const order = orders.find(o => o.phone === pendingDailyMealPhone && cartSignature(o.items) === pendingDailyMealSig);
  if(order){
    dailyMeals.push({
      id: uid(),
      phone: pendingDailyMealPhone,
      name: pendingDailyMealName,
      signature: pendingDailyMealSig,
      items: order.items.map(i=>({productId:i.productId, name:i.name, price:i.price, qty:i.qty}))
    });
    await saveDailyMeals();
  }
  dailyMealPromptOpen = false;
  pendingDailyMealSig = null;
  showToast('Saved as your Daily Meal 🍱');
  render();
}

function loadDailyMeal(){
  const phoneInput = document.getElementById('daily-phone-input');
  const phone = phoneInput.value.trim();
  if(!/^\d{10}$/.test(phone)){ showToast('Enter a valid 10-digit phone number'); return; }
  const meal = [...dailyMeals].reverse().find(dm => dm.phone === phone);
  if(!meal){ showToast('No saved Daily Meal found for this number'); return; }
  cart = meal.items.map(i=>{
    const p = products.find(pp=>pp.id===i.productId);
    return { productId:i.productId, name:i.name, price: p ? p.price : i.price, qty:i.qty };
  }).filter(i=>{
    const p = products.find(pp=>pp.id===i.productId);
    return p && p.inStock;
  });
  if(cart.length===0){ showToast('Your daily meal items are currently unavailable'); return; }
  showToast('Daily Meal loaded into your cart!');
  cartOpen = true;
  render();
}

/* ---------- FEEDBACK ---------- */
async function submitFeedback(){
  const name = document.getElementById('fb-name').value.trim();
  const comment = document.getElementById('fb-comment').value.trim();
  if(!name){ showToast('Please enter your name'); return; }
  if(feedbackStars === 0){ showToast('Please select a star rating'); return; }
  feedbacks.push({ id: uid(), name, comment, stars: feedbackStars, timestamp: Date.now() });
  await saveFeedbacks();
  feedbackStars = 0;
  fbName = '';
  fbComment = '';
  showToast('Thanks for your feedback! 🙏');
  render();
  const el = document.getElementById('feedback');
  if(el) el.scrollIntoView({behavior:'smooth'});
}

/* ---------- ADMIN LOGIC ---------- */
function doAdminLogin(){
  const val = document.getElementById('admin-pass').value;
  if(val === ADMIN_PASSWORD){
    adminAuthed = true;
    currentView = 'admin';
    adminTab = 'products';
    loginError = '';
  } else {
    loginError = 'Incorrect password. Please try again.';
  }
  render();
}

async function saveProductFromForm(id, isNew){
  const name = document.getElementById('pf-name').value.trim();
  const category = document.getElementById('pf-category').value;
  const price = parseFloat(document.getElementById('pf-price').value);
  const description = document.getElementById('pf-description').value.trim();
  const inStock = document.getElementById('pf-instock').classList.contains('on');
  const isSpecial = document.getElementById('pf-special').classList.contains('on');
  const wrap = document.getElementById('img-preview-wrap');
  const image = wrap.dataset.value || (wrap.querySelector('img') ? wrap.querySelector('img').src : '');

  if(!name){ showToast('Please enter a product name'); return; }
  if(isNaN(price) || price < 0){ showToast('Please enter a valid price'); return; }
  if(!image){ showToast('Please upload an image'); return; }

  if(isNew){
    products.push({ id: uid(), name, category, price, description, image, inStock, isSpecial });
  } else {
    const p = products.find(p=>p.id===id);
    if(p){ Object.assign(p, {name, category, price, description, image, inStock, isSpecial}); }
  }
  await saveProducts();
  editingProduct = null;
  showToast('Product saved');
  render();
}
